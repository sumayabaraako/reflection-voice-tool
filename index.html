<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spreekmemo Reflectie Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Speaking Memo Reflection Tool</h1>

        <section id="theme-section">
            <h2>Choose a theme</h2>

            <select id="themeSelect"></select>

            <input
                type="text"
                id="newThemeInput"
                placeholder="Add new theme"
            >

            <button id="addThemeBtn">
                Add theme
            </button>

            <button id="continueBtn">
                Further
            </button>
        </section>

        <section id="record-section">
            <h2>Record reflection</h2>

            <p id="recordStatus">
                Ready to record
            </p>

            <button id="startBtn">
                Start recording
            </button>

            <button id="stopBtn" disabled>
                Stop recording
            </button>

            <audio id="audioPlayer" controls></audio>

            <button id="saveBtn" disabled>
                Save reflection
            </button>
        </section>
    </div>

    <script src="script.js"></script>

</body>
</html>
