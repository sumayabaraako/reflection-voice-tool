<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spreekmemo Reflectie Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Speaking Memo Reflection Tool</h1>

        <section id="theme-section">
            <h2>Choose a theme</h2>

            <select id="themeSelect"></select>

            <input
                type="text"
                id="newThemeInput"
                placeholder="Add new theme"
            >

            <button id="addThemeBtn">
                Add theme
            </button>

            <button id="continueBtn">
                Further
            </button>
        </section>

        <section id="record-section">
    <h2>Record reflection</h2>

    <p id="recordStatus">
        Ready to record
    </p>

    <div class="recorder-card">
        <button id="startBtn" class="mic-button" aria-label="Start recording">
            <span class="mic-icon"></span>
        </button>

        <p class="record-hint">
            Tap to start recording
        </p>
    </div>

    <button id="stopBtn" class="stop-button" disabled>
        Stop recording
    </button>

    <audio id="audioPlayer" controls></audio>

    <button id="saveBtn" disabled>
        Save reflection
    </button>
</section>

     <section id="constellation-section">

            <h2>Reflection Constellation</h2>

            <div id="constellation">

            </div>

        </section>

    </div>

    <script src="script.js"></script>

</body>
</html>
